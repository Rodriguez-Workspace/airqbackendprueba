spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false

  mqtt:
    broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
    client-id: airq-prod-backend
    default-topic: airq/cloud/telemetry

  brevo:
    api:
      url: ${BREVO_API_URL:https://api.brevo.com/v3/smtp/email}
      key: ${BREVO_API_KEY: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}
      sender: ${BREVO_SENDER:b01efb001@smtp-brevo.com}

ml:
  api:
    url: ${ML_API_URL}

cors:
  allowed:
    origins: ${ALLOWED_CORS_ORIGINS:*}
